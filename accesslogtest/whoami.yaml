apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  labels:
    app: whoami
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
      - name: whoami
        image: traefik/whoami:v1.10.1
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  labels:
    app: whoami
spec:
  selector:
    app: whoami
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP

---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: whoami-ingressroute
  namespace: default

spec:
  entryPoints:
    - tcpep

  routes:
  - match: HostSNI(`*`)
    services:
      - name: whoami
        port: 80





---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami-http
  labels:
    app: whoami-http
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami-http
  template:
    metadata:
      labels:
        app: whoami-http
    spec:
      containers:
      - name: whoami
        image: traefik/whoami:v1.10.1
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: whoami-http
  labels:
    app: whoami-http
spec:
  selector:
    app: whoami-http
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whoami-http-ingressroute
  namespace: default
spec:
  entryPoints:
    - web
  routes:
  - match: Host(`whoami.localhost`)
    kind: Rule
    services:
      - name: whoami-http
        port: 80