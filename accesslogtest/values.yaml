additionalArguments:
- "--global.sendanonymoususage=false" #deactivates anonoymous logs being transfered to traefik

ingressRoute:
  dashboard:
    enabled: true

ports:
  tcpep:
    port: 2222
    expose:
      default: true
    protocol: TCP
    exposedPort: 2222
    allowACMEByPass: false
